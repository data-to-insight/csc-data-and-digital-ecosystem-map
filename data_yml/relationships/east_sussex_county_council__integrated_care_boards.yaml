description: >
  East Sussex County Council works with Integrated Care Boards, including NHS
  Sussex, as part of the Sussex Integrated Care System to plan, commission and
  deliver joined-up health and social care services for the local population.
  ESCC representatives participate in integrated care partnerships and joint
  strategic planning with the ICB.

